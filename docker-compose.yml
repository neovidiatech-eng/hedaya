services:
  postgres:
    image: postgres:16-alpine
    container_name: hedaya_postgres
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hedaya_network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hedaya_pgadmin
    restart: unless-stopped
    ports:
      - "5058:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hedaya_network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"

  redis:
    image: redis:7-alpine
    container_name: hedaya_redis
    restart: unless-stopped
    ports:
      - "6388:6379"
    volumes:
      - redis_data:/data
    networks:
      - hedaya_network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hedaya_app
    restart: unless-stopped
    volumes:
      - images:/app/uploads
    ports:
      - "3008:3008"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPT_KEY: ${ENCRYPT_KEY}
      SALT: ${SALT}
      JWT_SECRET_ACCESS_ADMIN: ${JWT_SECRET_ACCESS_ADMIN}
      JWT_SECRET_REFRESH_ADMIN: ${JWT_SECRET_REFRESH_ADMIN}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      FIREBASE_TYPE: ${FIREBASE_TYPE}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_PRIVATE_KEY_ID: ${FIREBASE_PRIVATE_KEY_ID}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_CLIENT_ID: ${FIREBASE_CLIENT_ID}
      FIREBASE_AUTH_URI: ${FIREBASE_AUTH_URI}
      FIREBASE_TOEKN_URI: ${FIREBASE_TOEKN_URI}
      FIREBASE_AUTH_PROVIDER: ${FIREBASE_AUTH_PROVIDER}
      FIREBASE_CLIENT_X509_CERT_URL: ${FIREBASE_CLIENT_X509_CERT_URL}
      FIREBASE_UNIVERSE_DOMAIN: ${FIREBASE_UNIVERSE_DOMAIN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      PORT: "3008"
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hedaya_network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"

networks:
  hedaya_network:
    driver: bridge

volumes:
  pgdata:
  pgadmin_data:
  redis_data:
  images:
